<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAstudyhub | 최신 IRS 세무 뉴스 및 EA 문제은행</title>
    <!-- 기존 스타일 및 폰트 유지 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* 기존 index.html의 스타일 유지 */
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --gray-600: #475569;
            --gray-800: #1e293b;
            --white: #ffffff;
            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            --radius-2xl: 1.5rem;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f0f4ff 50%, #ffffff 100%);
            padding: 2rem 1rem;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-2xl);
            padding: 3rem;
            box-shadow: var(--shadow-lg);
        }

        /* 새롭게 추가된 뉴스 게시판 스타일 */
        .news-section {
            margin-top: 3rem;
            text-align: left;
        }

        .news-card {
            background: var(--white);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border-left: 5px solid var(--primary);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .news-date { font-size: 0.85rem; color: var(--gray-600); }
        .news-title { font-size: 1.2rem; font-weight: 800; color: var(--primary-dark); margin: 0.5rem 0; }
        .news-content { font-size: 0.95rem; color: var(--gray-800); }
        
        .badge {
            display: inline-block;
            background: #dbeafe;
            color: #1e40af;
            padding: 0.2rem 0.8rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 기존 헤더 로고 및 소개 섹션 -->
        <h1>EAstudyhub.com</h1>
        <p>미국 세무사 시험 합격의 지름길</p>

        <!-- 새롭게 추가된 뉴스 게시판 섹션 -->
        <div class="news-section">
            <h2 style="margin-bottom: 1.5rem;"><i class="fa-solid fa-bullhorn"></i> 최신 IRS 세무 뉴스</h2>
            
            <!-- 게시물 1: 방금 번역한 내용 -->
            <div class="news-card">
                <div class="badge">Tax Tip 2026-36</div>
                <div class="news-date">2026년 4월 30일</div>
                <div class="news-title">내년 세금 보고 준비, 지금 원천징수 점검부터 시작하세요!</div>
                <div class="news-content">
                    2025년 세금 신고가 끝났지만, 내년의 '세금 폭탄'을 피하기 위해 지금 바로 원천징수액(Withholding)을 확인하는 것이 중요합니다. IRS의 무료 계산기를 사용하여 실수령액을 최적화하세요.[cite: 1]
                </div>
                <a href="#" style="color: var(--primary); font-size: 0.9rem; text-decoration: none; font-weight: bold; display: block; margin-top: 1rem;">더 읽어보기 →</a>
            </div>
        </div>

        <!-- 기존 출시 알림 신청 폼 및 푸터 유지 -->
    </div>
</body>
</html>
