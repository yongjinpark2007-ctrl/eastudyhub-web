            margin-bottom: 1.5rem;

        }

            line-height: 1.6; 
            color: #475569; 
            margin-bottom: 2rem;

        .highlight { 
            color: #2563eb; 
            font-weight: bold; 
            border-bottom: 2px solid #bfdbfe;
        }
        /* 특징 박스 */

            background: #f8fafc;
            padding: 1.5rem;
            border-radius: 1rem;
            margin: 2rem 0;
            text-align: left;
            font-size: 0.95rem;
        }
        .features-title {
            font-weight: bold;
            color: #334155;
            margin-bottom: 0.8rem;
            display: block;
        }
        ul { list-style: none; padding: 0; margin: 0; }
        li { margin-bottom: 0.6rem; color: #64748b; display: flex; align-items: flex-start; }
        li::before { content: "✓"; color: #2563eb; font-weight: bold; margin-right: 0.5rem; }

        .footer { 
            margin-top: 2.5rem; 
            font-size: 0.85rem; 
            color: #94a3b8; 
            border-top: 1px solid #e2e8f0;
            padding-top: 1.5rem;
